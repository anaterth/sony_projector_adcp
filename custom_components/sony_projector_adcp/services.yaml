send_key:
  name: Send Key
  description: Send a remote control key command to the projector
  target:
    entity:
      domain: media_player
      integration: sony_projector_adcp
  fields:
    key:
      name: Key
      description: The remote control key to send
      required: true
      selector:
        select:
          options:
            - label: Menu
              value: menu
            - label: Up
              value: up
            - label: Down
              value: down
            - label: Left
              value: left
            - label: Right
              value: right
            - label: Enter
              value: enter
            - label: Reset
              value: reset
            - label: Blank (Video Mute)
              value: blank
            - label: Power On
              value: power_on
            - label: Power Off
              value: power_off
            - label: Input Select
              value: input
            - label: Lens Control
              value: lens_control
            - label: Lens Focus
              value: lens_focus
            - label: Lens Focus Far
              value: lens_focus_far
            - label: Lens Focus Near
              value: lens_focus_near
            - label: Lens Zoom
              value: lens_zoom
            - label: Lens Zoom Up
              value: lens_zoom_up
            - label: Lens Zoom Down
              value: lens_zoom_down
            - label: Lens Shift
              value: lens_shift
            - label: Lens Shift Up
              value: lens_shift_up
            - label: Lens Shift Down
              value: lens_shift_down
            - label: Lens Shift Left
              value: lens_shift_left
            - label: Lens Shift Right
              value: lens_shift_right
            - label: Lens Position 1
              value: lens_position1
            - label: Lens Position 2
              value: lens_position2
            - label: Lens Position 3
              value: lens_position3
            - label: Lens Position 4
              value: lens_position4
            - label: Lens Position 5
              value: lens_position5
            - label: Aspect Cycle
              value: aspect
            - label: Picture Mode Cycle
              value: picmode
            - label: Color Temperature Cycle
              value: color_temp
            - label: Motionflow Cycle
              value: motionflow
            - label: Gamma Correction Cycle
              value: gamma_correction
            - label: Reality Creation Toggle
              value: reality_creation
            - label: Iris Mode Cycle
              value: iris_mode
            - label: Laser Brightness +
              value: "laser_brightness +"
            - label: Laser Brightness -
              value: "laser_brightness -"
            - label: 3D Toggle
              value: "3d"
            - label: Status On
              value: status_on
            - label: Status Off
              value: status_off

set_picture_mode:
  name: Set Picture Mode
  description: Set the picture preset mode
  target:
    entity:
      domain: media_player
      integration: sony_projector_adcp
  fields:
    mode:
      name: Picture Mode
      description: The picture mode to set
      required: true
      selector:
        select:
          options:
            - label: Cinema Film 1
              value: cinema_film1
            - label: Cinema Film 2
              value: cinema_film2
            - label: Reference
              value: reference
            - label: TV
              value: tv
            - label: Photo
              value: photo
            - label: Game
              value: game
            - label: Bright Cinema
              value: brt_cinema
            - label: Bright TV
              value: brt_tv
            - label: IMAX Enhanced
              value: imax
            - label: User
              value: user
            - label: User 1
              value: user1
            - label: User 2
              value: user2
            - label: User 3
              value: user3
            - label: Cinema Digital
              value: cinema_digital

